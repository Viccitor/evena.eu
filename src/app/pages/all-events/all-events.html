<section id="sessao-todos-eventos">
   <div class="container-todos-eventos">
      <header>
        <h1 class="titulo-sessao">Todos os Eventos</h1>
      </header>
     
      <nav class="categorias-nav">
        <div class="scroll-container">
          @for (cat of categorias; track cat) {
            <button 
              type="button"
              class="chip-categoria" 
              [class.active]="categoriaSelecionada === cat"
              (click)="selecionarCategoria(cat)">
              {{ cat }}
            </button>
          }
        </div>
      </nav>
     
      <main>

        @if(listaExibida.length > 0){
          <div class="grid-eventos">
            @for (item of listaExibida; track item.id) {
              <app-card-evento [dadosEvento]="item"></app-card-evento>
            }
          </div>
        }
        @else {
          <article class="sem-eventos">
            <h2>Ops! Nenhum evento encontrado.</h2>
            <p>Não encontramos enventos na categoria <strong>{{categoriaSelecionada}}</strong> no momento.</p>
            <button (click)="selecionarCategoria('Todos')" class="btn-limpar">Ver todos os eventos</button>
          </article>
        }
      </main>
   </div>
</section>
