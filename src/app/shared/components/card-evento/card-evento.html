<div class="card-evento" (click)="irParaEvento()">
    <div class="imagem-container">
        <img [src]="dadosEvento.imagem" [alt]="dadosEvento.titulo">
    </div>

    <div class="info">
        <h1>{{ dadosEvento.titulo }}</h1>
        <h2>{{ dadosEvento.data }}</h2>
        <h3>{{ dadosEvento.local }}</h3>
    </div>
</div>
