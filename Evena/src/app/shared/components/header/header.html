<header class="app-header">
    <div class="header-section left">
        <img src="nomeEvena.svg" class="logo" routerLink="/">
    </div>

    <div class="header-section center desktop-only">
        <button class="btn_nav_bar" routerLink="/" routerLinkActive="ativo" [routerLinkActiveOptions]="{exact: true}">Início</button>
        <button class="btn_nav_bar" routerLink="/eventos" routerLinkActive="ativo">Eventos</button>
    </div>

    <div class="header-section right">
        <div class="btn_procurar">
            <label for="search-input">
                <img src="search.png" class="procurar"> 
            </label>
            <input type="text" placeholder="Pesquisar..." class="input_busca">
        </div>
        
        <img src="perfil.png" class="perfil desktop-only">
        
        <button class="menu-mobile-btn" (click)="toggleMenu()" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <div class="menu-overlay" [class.aberto]="menuAberto">
        <button class="btn_fechar" (click)="toggleMenu()">×</button>
        <nav class="mobile-nav">
            <a routerLink="/" (click)="toggleMenu()">Início</a>
            <a routerLink="/eventos" (click)="toggleMenu()">Eventos</a>
            <hr class="divisor-menu">
            <a routerLink="/perfil" (click)="toggleMenu()">Meu Perfil</a>
        </nav>
    </div>
</header>
