<section class="lista-eventos-container">
  @if (eventos$ | async; as eventos) {
    <div class="grid-eventos">
      @for (item of eventos; track item.id) {
        <app-card-evento [dadosEvento]="item"></app-card-evento>
      } @empty {
        <div class="empty-state-container">
          <h2 class="ops-titulo">Ops! Nenhum evento encontrado.</h2>
          <p class="ops-subtitulo">
            Não encontramos eventos nesta busca no momento.
          </p>
          <button class="btn-ver-todos" (click)="onResetarClique()">
            Ver todos os eventos
          </button>
        </div>
      }
    </div>
  } @else {
    <div class="loading-container">
      <p>Buscando eventos...</p>
    </div>
  }
</section>
