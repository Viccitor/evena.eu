<section id="sessao-todos-eventos">
   <div class="container-todos-eventos">
      <header>
        <h1 class="titulo-sessao">Todos os Eventos</h1>
      </header>
     
      <nav class="categorias-nav">
        <div class="scroll-container">
          @for (cat of categorias; track cat) {
            <button 
              type="button"
              class="chip-categoria" 
              [class.active]="categoriaSelecionada === cat"
              (click)="selecionarCategoria(cat)">
              {{ cat }}
            </button>
          }
        </div>
      </nav>
     
      <main class="grid-eventos">
        @for (item of listaExibida; track item.id) {
          <app-card-evento [dadosEvento]="item"></app-card-evento>
        }
      </main>
   </div>
</section>
